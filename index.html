<h2 class="section-title">Attendance Records (Till February 2026)</h2>
        <div class="attendance-card">
            <div class="course-content">
                <p>Real-time attendance tracking. Students with <strong style="color: #e53e3e;">attendance below 75%</strong> are highlighted in red.</p>
                <div id="attendance-data" style="overflow-x: auto;">
                    <p id="loading-text">Synchronizing with Google Sheets...</p>
                </div>
            </div>
        </div>
    </div>

    <style>
        .low-attendance {
            background-color: #fff5f5 !important;
            color: #c53030 !important;
            font-weight: bold;
        }
        /* Mobile optimization for large tables */
        #attendance-data table {
            min-width: 600px;
        }
    </style>

    <footer>
        <p>&copy; 2026 Dr. Ankush Kapoor. All rights reserved.</p>
        <p style="font-size: 0.9rem; color: #cbd5e1;">ABVGIET, Pragatinagar, Shimla (H.P.)</p>
        
        <div class="visitor-counter">
            <p>Page Views</p>
            <img src="https://api.visitorbadge.io/api/visitors?path=ankush8818.github.io/Ankush.github.io&countColor=%23FF416C&labelColor=%231A2980" alt="Visitor Badge" />
        </div>
    </footer>

    <script>
        const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTqAd3c4bG0GrAj6ypKV8elGH0OhNNvDuwkANnZD-WMC05bxddgN8bG16RxeN3ah5hgKERoM9qqwmSw/pub?gid=358740635&single=true&output=csv";

        async function fetchAttendance() {
            try {
                const response = await fetch(sheetUrl);
                const csvText = await response.text();
                
                // Parse CSV rows
                const rows = csvText.split('\n').map(row => row.split(',')).filter(row => row.length > 1);
                
                // Find which column has "Attendance" or "%" in the header
                const header = rows[0];
                const attendanceColIndex = header.findIndex(col => 
                    col.toLowerCase().includes('attendance') || col.includes('%')
                );

                let tableHtml = '<table class="data-table"><thead><tr>';
                
                // Build Header
                header.forEach(col => {
                    tableHtml += `<th>${col.trim()}</th>`;
                });
                tableHtml += '</tr></thead><tbody>';

                // Build Rows
                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    let rowClass = "";

                    // Check if attendance is below 75
                    if (attendanceColIndex !== -1) {
                        const attendanceValue = parseFloat(row[attendanceColIndex]);
                        if (!isNaN(attendanceValue) && attendanceValue < 75) {
                            rowClass = 'class="low-attendance"';
                        }
                    }

                    tableHtml += `<tr ${rowClass}>`;
                    row.forEach(cell => {
                        tableHtml += `<td>${cell.trim()}</td>`;
                    });
                    tableHtml += '</tr>';
                }

                tableHtml += '</tbody></table>';
                document.getElementById('attendance-data').innerHTML = tableHtml;

            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('attendance-data').innerHTML = 
                    '<p style="color:var(--accent-color);">Unable to load attendance data. Please check the source sheet.</p>';
            }
        }

        window.onload = fetchAttendance;
    </script>
</body>
