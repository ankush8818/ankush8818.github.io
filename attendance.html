<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Dashboard | Dr. Ankush Kapoor</title>
    <style>
        :root {
            --primary-color: #1A2980; 
            --secondary-color: #26D0CE; 
            --accent-color: #FF416C; 
            --bg-color: #f4f7f6;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); margin: 0; padding: 0; }
        nav { background: var(--primary-color); padding: 1rem; text-align: center; position: sticky; top: 0; z-index: 1000; }
        nav a { color: white; text-decoration: none; font-weight: bold; margin: 0 15px; }

        .container { max-width: 95%; margin: 2rem auto; padding: 0 10px; }
        
        .header-card {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            border-left: 8px solid var(--primary-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .search-box {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .table-wrapper { 
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            overflow-x: auto; /* Ensures all columns are accessible via scroll */
            max-height: 70vh; /* Adds vertical scroll for long lists */
        }

        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        
        /* Freeze first column (Names/Roll Nos) for better UX */
        th { 
            background: #f8fafc; 
            color: var(--primary-color); 
            padding: 12px 8px; 
            text-align: center; 
            border: 1px solid #e2e8f0;
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        td { 
            padding: 10px 8px; 
            border: 1px solid #edf2f7; 
            text-align: center;
            white-space: nowrap; 
        }
        
        /* Highlight low attendance */
        .low-att {
            background-color: #fff5f5 !important;
            color: #c53030 !important;
            font-weight: bold;
        }

        .student-info { text-align: left; font-weight: bold; background: #fff; position: sticky; left: 0; z-index: 5; }

        #status-message { text-align: center; padding: 40px; font-weight: bold; color: var(--primary-color); }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Main Portfolio</a>
        <a href="attendance.html">Full Attendance View</a>
    </nav>

    <div class="container">
        <div class="header-card">
            <h1 style="margin:0; color: var(--primary-color);">Comprehensive Attendance Dashboard</h1>
            <p>Including Lecture & Lab Data (VLSI, EMMI, Fiber Optics, Mini Projects)</p>
        </div>

        <input type="text" id="searchInput" class="search-box" placeholder="Search by Student Name or Roll Number..." onkeyup="filterTable()">

        <div id="status-message">Loading all columns...</div>

        <div class="table-wrapper">
            <table id="attendanceTable">
                <thead id="tableHeader"></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTqAd3c4bG0GrAj6ypKV8elGH0OhNNvDuwkANnZD-WMC05bxddgN8bG16RxeN3ah5hgKERoM9qqwmSw/pub?gid=358740635&single=true&output=csv";

        async function init() {
            try {
                const response = await fetch(csvUrl);
                const text = await response.text();
                const rows = text.split(/\r?\n/).map(row => row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));

                if (rows.length < 2) return;

                // HANDLE DOUBLE HEADERS
                const row1 = rows[0]; // Subject Names
                const row2 = rows[1]; // Sub-headers (Lec Attd%)
                
                let combinedHeader = [];
                for(let i=0; i < row2.length; i++) {
                    let top = row1[i] ? row1[i].replace(/"/g, '').trim() : "";
                    let bottom = row2[i] ? row2[i].replace(/"/g, '').trim() : "";
                    // Combine them if they exist, otherwise just use one
                    combinedHeader.push(top && bottom && top !== bottom ? `${top}<br><small>${bottom}</small>` : (top || bottom));
                }

                renderTable(combinedHeader, rows.slice(2));
                document.getElementById('status-message').style.display = 'none';
            } catch (e) {
                document.getElementById('status-message').innerHTML = "Error loading columns. Check Sheet visibility.";
                console.error("Fetch error: ", e);
            }
        }

        function renderTable(headers, data) {
            const headArea = document.getElementById('tableHeader');
            const bodyArea = document.getElementById('tableBody');

            headArea.innerHTML = `<tr>${headers.map((h, i) => `<th class="${i < 2 ? 'student-info' : ''}">${h}</th>`).join('')}</tr>`;

            let bodyHtml = '';
            data.forEach(row => {
                if (row.length < 2) return;
                
                bodyHtml += '<tr>';
                row.forEach((cell, index) => {
                    let cleanCell = cell.replace(/"/g, '').trim();
                    let cssClass = index < 2 ? 'student-info' : '';
                    
                    // Logic to highlight ANY cell with attendance < 75%
                    if (cleanCell.includes('%')) {
                        let val = parseFloat(cleanCell);
                        // If it's a valid number and less than 75, add the red highlighting class
                        if (!isNaN(val) && val < 75) {
                            cssClass += ' low-att';
                        }
                    }
                    bodyHtml += `<td class="${cssClass}">${cleanCell}</td>`;
                });
                bodyHtml += '</tr>';
            });
            bodyArea.innerHTML = bodyHtml;
        }

        // Function to make the Search Bar work
        function filterTable() {
            let input = document.getElementById("searchInput");
            let filter = input.value.toUpperCase();
            
            // Target the table body directly to safely ignore headers
            let tbody = document.getElementById("tableBody");
            let tr = tbody.getElementsByTagName("tr");

            // Loop through all data rows (starting at 0 since we are in tbody)
            for (let i = 0; i < tr.length; i++) {
                // Column 0 is Roll Number, Column 1 is Name
                let td1 = tr[i].getElementsByTagName("td")[0]; 
                let td2 = tr[i].getElementsByTagName("td")[1]; 

                // Safely extract text ONLY if the cell actually exists
                let txtValue1 = td1 ? (td1.textContent || td1.innerText) : "";
                let txtValue2 = td2 ? (td2.textContent || td2.innerText) : "";
                
                // If either column matches the search query, show the row
                if (txtValue1.toUpperCase().indexOf(filter) > -1 || txtValue2.toUpperCase().indexOf(filter) > -1) {
                    tr[i].style.display = "";
                } else {
                    tr[i].style.display = "none";
                }
            }
        }

        // THIS IS THE MISSING PIECE! Tell the browser to actually run the code.
        init();
        
    </script>
</body>
</html>
